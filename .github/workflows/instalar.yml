name: Servidor de Minecraft Forge CSM

on:
  workflow_dispatch: # Botón manual para encenderlo

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
    - name: Configurar Java 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Crear Directorio y Descargar Forge
      run: |
        mkdir -p minecraft_server
        cd minecraft_server
        wget -O forge-installer.jar https://maven.minecraftforge.net/net/minecraftforge/forge/1.20.1-47.3.0/forge-1.20.1-47.3.0-installer.jar

    - name: Ejecutar Instalador de Servidor Forge
      run: |
        cd minecraft_server
        java -jar forge-installer.jar --installServer
        echo "eula=true" > eula.txt
        mkdir -p mods

    - name: Instalar Tunel de Conexión (Playit)
      run: |
        cd minecraft_server
        curl -Ao playit https://github.com
        chmod +x playit

    - name: Arrancar Servidor CSM
      run: |
        cd minecraft_server
        ./playit &
        java -Xmx6G -Xms6G -jar forge-1.20.1-47.3.0-universal.jar nogui
