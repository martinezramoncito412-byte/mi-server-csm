name: Servidor de Minecraft Forge CSM

on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
    - name: Configurar Java 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Descargar e Instalar Forge 1.20.1
      run: |
        mkdir -p minecraft_server
        cd minecraft_server
        # Descargamos el instalador oficial
        wget -O forge-installer.jar https://minecraftforge.net
        # Ejecutamos la instalacion del servidor
        java -jar forge-installer.jar --installServer
        # Aceptamos los terminos de Minecraft (EULA)
        echo "eula=true" > eula.txt
        mkdir -p mods
        # Le damos permisos de ejecucion al nuevo script de arranque de Forge
        chmod +x run.sh

    - name: Instalar Tunel de Conexión (Playit)
      run: |
        cd minecraft_server
        curl -Ao playit https://github.com
        chmod +x playit

    - name: Arrancar Servidor Oficial Forge 1.20.1
      run: |
        cd minecraft_server
        ./playit &
        # Editamos los argumentos de memoria para que use 6GB en la máquina de GitHub
        sed -i 's/-Xmx4G/-Xmx6G/g' user_jvm_args.txt
        # Arrancamos usando el script oficial de Forge para Linux
        ./run.sh
